name: Build SDL3 for Windows

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup CMake
      uses: lukka/get-cmake@latest
    
    - name: Clone SDL3
      run: git clone https://github.com/libsdl-org/SDL.git --branch main --depth 1
    
    - name: Configure
      working-directory: SDL
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DBUILD_SHARED_LIBS=ON -DSDL_SHARED=ON -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      working-directory: SDL/build
      run: cmake --build . --config Release --parallel
    
    - name: Package
      working-directory: SDL/build
      run: |
        mkdir sdl3-win-x64
        cp Release/SDL3.dll sdl3-win-x64/
        cp Release/SDL3.lib sdl3-win-x64/
        cp -r ../include/SDL3 sdl3-win-x64/
        echo "SDL3 Windows x64 build" > sdl3-win-x64/README.txt
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: sdl3-windows-x64
        path: SDL/build/sdl3-win-x64
        retention-days: 30
