name: Build SDL3 for Windows

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup CMake
      uses: lukka/get-cmake@latest
    
    - name: Clone SDL3
      run: |
        git clone https://github.com/libsdl-org/SDL.git --branch main --depth 1
        cd SDL
        echo "SDL cloned successfully"
    
    - name: Configure SDL3
      run: |
        cd SDL
        mkdir build
        cd build
        cmake .. `
          -G "Visual Studio 17 2022" `
          -A x64 `
          -DBUILD_SHARED_LIBS=ON `
          -DSDL_STATIC=OFF `
          -DSDL_SHARED=ON `
          -DCMAKE_BUILD_TYPE=Release
    
    - name: Build SDL3
      run: |
        cd SDL/build
        cmake --build . --config Release --parallel
    
    - name: Package SDL3
      run: |
        cd SDL/build
        mkdir sdl3-windows-x64
        mkdir sdl3-windows-x64/lib
        mkdir sdl3-windows-x64/include
        
        # Copy DLL and import library
        Copy-Item -Path "Release/SDL3.dll" -Destination "sdl3-windows-x64/"
        Copy-Item -Path "Release/SDL3.lib" -Destination "sdl3-windows-x64/lib/"
        
        # Copy headers
        Copy-Item -Path "../include/SDL3" -Destination "sdl3-windows-x64/include/" -Recurse
        
        # Create README
        @"
# SDL3 Windows x64 Build

Built on: $(Get-Date -Format "yyyy-MM-dd HH:mm:ss UTC")
Platform: Windows x64
Build Type: Release (Shared Library)

## Files:
- SDL3.dll - Shared library (runtime)
- lib/SDL3.lib - Import library (link-time)
- include/SDL3/ - Header files

## Usage:
1. Copy SDL3.dll to your application directory
2. Link your project with SDL3.lib
3. Include SDL3 headers: #include <SDL3/SDL.h>

## Build from source:
- SDL3 main branch: https://github.com/libsdl-org/SDL
- Built with Visual Studio 2022, CMake
"@ | Out-File -FilePath "sdl3-windows-x64/README.txt" -Encoding UTF8
        
        # Get file sizes
        Get-ChildItem -Path "sdl3-windows-x64" -Recurse -File | Format-Table Name, @{Name="Size (KB)";Expression={[math]::Round($_.Length/1KB,2)}}
    
    - name: Upload SDL3 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sdl3-windows-x64
        path: SDL/build/sdl3-windows-x64/
        retention-days: 30
    
    - name: Build Summary
      run: |
        Write-Output "## SDL3 Build Complete! :rocket:" >> $env:GITHUB_STEP_SUMMARY
        Write-Output "" >> $env:GITHUB_STEP_SUMMARY
        Write-Output "### Build Info" >> $env:GITHUB_STEP_SUMMARY
        Write-Output "- **Platform**: Windows x64" >> $env:GITHUB_STEP_SUMMARY
        Write-Output "- **Build Type**: Release (Shared Library)" >> $env:GITHUB_STEP_SUMMARY
        Write-Output "- **SDL3 Version**: main branch (latest)" >> $env:GITHUB_STEP_SUMMARY
        Write-Output "" >> $env:GITHUB_STEP_SUMMARY
        Write-Output "### Artifacts" >> $env:GITHUB_STEP_SUMMARY
        Write-Output "Download the SDL3 build artifacts from the Actions tab." >> $env:GITHUB_STEP_SUMMARY
        Write-Output "" >> $env:GITHUB_STEP_SUMMARY
        Write-Output "**Files included**:" >> $env:GITHUB_STEP_SUMMARY
        Write-Output "- \`SDL3.dll\` - Shared library" >> $env:GITHUB_STEP_SUMMARY
        Write-Output "- \`lib/SDL3.lib\` - Import library" >> $env:GITHUB_STEP_SUMMARY
        Write-Output "- \`include/SDL3/\` - Header files" >> $env:GITHUB_STEP_SUMMARY
