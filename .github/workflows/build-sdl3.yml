name: Build SDL3 for Windows

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup CMake
      uses: lukka/get-cmake@latest
    
    - name: Clone SDL3
      run: |
        git clone https://github.com/libsdl-org/SDL.git --branch main --depth 1
        cd SDL
        echo "SDL cloned successfully"
    
    - name: Configure SDL3
      run: |
        cd SDL
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DBUILD_SHARED_LIBS=ON -DSDL_STATIC=OFF -DSDL_SHARED=ON -DCMAKE_BUILD_TYPE=Release
    
    - name: Build SDL3
      run: |
        cd SDL/build
        cmake --build . --config Release --parallel
    
    - name: Package SDL3
      shell: pwsh
      run: |
        cd SDL/build
        mkdir sdl3-windows-x64
        mkdir sdl3-windows-x64/lib
        mkdir sdl3-windows-x64/include
        
        Copy-Item -Path "Release/SDL3.dll" -Destination "sdl3-windows-x64/"
        Copy-Item -Path "Release/SDL3.lib" -Destination "sdl3-windows-x64/lib/"
        Copy-Item -Path "../include/SDL3" -Destination "sdl3-windows-x64/include/" -Recurse
        
        $readme = @"
SDL3 Windows x64 Build
Built on: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')
Platform: Windows x64
Build Type: Release (Shared Library)

Files:
  SDL3.dll - Shared library
  lib/SDL3.lib - Import library
  include/SDL3/ - Header files

Usage:
  1. Copy SDL3.dll to your application directory
  2. Link your project with SDL3.lib
  3. Include SDL3 headers

Built from: https://github.com/libsdl-org/SDL (main branch)
"@
        Set-Content -Path "sdl3-windows-x64/README.txt" -Value $readme -Encoding UTF8
        
        Get-ChildItem -Path "sdl3-windows-x64" -Recurse -File | Format-Table Name, Length
    
    - name: Upload SDL3 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sdl3-windows-x64
        path: SDL/build/sdl3-windows-x64/
        retention-days: 30
    
    - name: Build Summary
      run: |
        Write-Output "## SDL3 Build Complete!" >> $env:GITHUB_STEP_SUMMARY
        Write-Output "" >> $env:GITHUB_STEP_SUMMARY
        Write-Output "### Build Info" >> $env:GITHUB_STEP_SUMMARY
        Write-Output "- Platform: Windows x64" >> $env:GITHUB_STEP_SUMMARY
        Write-Output "- Build Type: Release (Shared Library)" >> $env:GITHUB_STEP_SUMMARY
        Write-Output "- SDL3 Version: main branch" >> $env:GITHUB_STEP_SUMMARY
        Write-Output "" >> $env:GITHUB_STEP_SUMMARY
        Write-Output "### Download" >> $env:GITHUB_STEP_SUMMARY
        Write-Output "Download the build artifacts from the Actions tab." >> $env:GITHUB_STEP_SUMMARY
